<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart NGO - Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffe4e9; --surface: #fff5f7; --card: #ffffff; --card-2: #fff0f3;
  --border: rgba(0,0,0,0.08); --border-lg: rgba(204,0,0,0.15);
  --accent: #cc0000; --accent-2: #ff3300; --danger: #dc2626;
  --success: #16a34a; --text: #1e1b4b; --muted: #7c6b8f;
  --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
  --radius: 14px; --radius-lg: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body); background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.015'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 72px;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 8px; z-index: 100;
}
.sidebar-logo {
  width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 12px; box-shadow: 0 0 20px rgba(204,0,0,0.25);
}
.nav-item {
  width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; font-size: 20px; color: var(--muted);
  border: 1px solid transparent; transition: all 0.2s; position: relative;
}
.nav-item:hover, .nav-item.active { background: rgba(204,0,0,0.08); border-color: rgba(204,0,0,0.2); color: var(--accent); }
.nav-item .tooltip {
  position: absolute; left: 60px; background: var(--card-2); border: 1px solid var(--border);
  color: var(--text); font-size: 12px; padding: 6px 10px; border-radius: 8px;
  white-space: nowrap; opacity: 0; pointer-events: none; transform: translateX(-4px);
  transition: all 0.2s;
}
.nav-item:hover .tooltip { opacity: 1; transform: translateX(0); }
.sidebar-spacer { flex: 1; }
.logout-btn {
  width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; font-size: 18px; color: var(--muted);
  transition: all 0.2s;
}
.logout-btn:hover { background: rgba(220,38,38,0.1); color: var(--danger); }
.main { margin-left: 72px; padding: 32px; min-height: 100vh; position: relative; z-index: 1; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
.page-title { font-family: var(--font-head); font-size: 26px; font-weight: 700; color: var(--text); }
.page-title span { color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.status-pill {
  display: flex; align-items: center; gap: 6px; background: rgba(22,163,74,0.1);
  border: 1px solid rgba(22,163,74,0.2); color: var(--success); font-size: 12px;
  padding: 6px 12px; border-radius: 99px;
}
.status-dot { width: 7px; height: 7px; background: var(--success); border-radius: 50%; animation: pulse-dot 2s ease infinite; }
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.avatar {
  width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; color: white;
}
.profile-wrap { max-width: 600px; }
.profile-hero {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 32px; display: flex; align-items: center; gap: 24px; margin-bottom: 20px;
}
.profile-avatar {
  width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center; font-size: 30px; color: white;
}
.profile-info h2 { font-family: var(--font-head); font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.profile-info p { font-size: 13px; color: var(--muted); }
.profile-fields { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.pf-row {
  display: flex; align-items: center; padding: 16px 24px;
  border-bottom: 1px solid var(--border); gap: 16px;
}
.pf-row:last-child { border-bottom: none; }
.pf-icon { font-size: 18px; width: 28px; text-align: center; }
.pf-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
.pf-value { font-size: 14px; font-weight: 500; color: var(--text); }

/* Chatbot Styles */
.chat-fab { position: fixed; bottom: 28px; right: 28px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 999; color: white; }
.chat-fab:hover { transform: scale(1.1); }
.chat-panel { position: fixed; bottom: 100px; right: 28px; width: 380px; height: 560px; background: var(--surface); border: 1px solid var(--border-lg); border-radius: 22px; display: flex; flex-direction: column; z-index: 998; overflow: hidden; opacity: 0; transform: translateY(20px) scale(0.95); pointer-events: none; transition: all 0.3s; }
.chat-panel.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: all; }
.chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.5); }
.chat-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: flex; align-items: center; justify-content: center; font-size: 16px; color: white; }
.chat-header-info { flex: 1; }
.chat-header-info h4 { font-family: var(--font-head); font-size: 14px; font-weight: 600; }
.chat-close { width: 30px; height: 30px; border-radius: 8px; background: var(--card-2); border: 1px solid var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; }
.chips-wrap { padding: 10px 16px 4px; display: flex; gap: 6px; flex-wrap: wrap; }
.chip { font-size: 11px; padding: 5px 10px; border-radius: 99px; background: rgba(204,0,0,0.08); border: 1px solid rgba(204,0,0,0.15); color: #b91c1c; cursor: pointer; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { display: flex; gap: 8px; max-width: 100%; }
.msg.user { flex-direction: row-reverse; }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; align-self: flex-end; }
.msg.bot .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; }
.msg.user .msg-avatar { background: var(--card-2); border: 1px solid var(--border); }
.msg-bubble { max-width: 82%; padding: 10px 14px; border-radius: 16px; font-size: 13px; }
.msg.bot .msg-bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.user .msg-bubble { background: linear-gradient(135deg, #cc0000, #ff3300); border-bottom-right-radius: 4px; color: white; }
.typing-indicator { display: none; align-items: center; gap: 8px; }
.typing-indicator.show { display: flex; }
.typing-bubble { background: var(--card); border: 1px solid var(--border); padding: 12px 16px; border-radius: 16px; display: flex; gap: 4px; }
.typing-dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.4s ease infinite; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
.chat-input-area { padding: 12px 16px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; }
.chat-input { flex: 1; background: var(--card-2); border: 1px solid var(--border); border-radius: 14px; padding: 10px 14px; color: var(--text); font-size: 13px; outline: none; resize: none; min-height: 42px; }
.chat-send { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: white; }
.chat-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 997; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.chat-backdrop.open { opacity: 1; pointer-events: all; }
@media (max-width: 640px) { .main { padding: 16px; } .chat-panel { width: calc(100vw - 24px); right: 12px; bottom: 90px; } }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">🚨</div>
  <a href="ngo.html" class="nav-item">🏠<span class="tooltip">Dashboard</span></a>
  <a href="create-need.html" class="nav-item">➕<span class="tooltip">Create Need</span></a>
  <a href="map.html" class="nav-item">🗺️<span class="tooltip">Map</span></a>
  <a href="profile.html" class="nav-item active">👤<span class="tooltip">Profile</span></a>
  <div class="sidebar-spacer"></div>
  <div class="logout-btn" onclick="logout()" title="Logout">🚪</div>
</nav>

<main class="main">
  <div class="topbar"><h1 class="page-title">My <span>Profile</span></h1><div class="topbar-right"><div class="status-pill"><div class="status-dot"></div> System Online</div><div class="avatar">🧑</div></div></div>
  <div class="profile-wrap">
    <div class="profile-hero"><div class="profile-avatar">🧑</div><div class="profile-info"><h2 id="p_name">Loading...</h2><p id="p_role">—</p><p id="p_email">—</p></div></div>
    <div class="profile-fields">
      <div class="pf-row"><span class="pf-icon">📧</span><div><div class="pf-label">Email</div><div class="pf-value" id="pf_email">—</div></div></div>
      <div class="pf-row"><span class="pf-icon">📞</span><div><div class="pf-label">Phone</div><div class="pf-value" id="p_phone">—</div></div></div>
      <div class="pf-row"><span class="pf-icon">📍</span><div><div class="pf-label">Location</div><div class="pf-value" id="p_location">—</div></div></div>
      <div class="pf-row"><span class="pf-icon">🎖️</span><div><div class="pf-label">Role</div><div class="pf-value" id="pf_role">—</div></div></div>
    </div>
  </div>
</main>

<!-- Chatbot -->
<div class="chat-backdrop" id="chatBackdrop" onclick="closeChat()"></div>
<div class="chat-panel" id="chatPanel">
  <div class="chat-header"><div class="chat-avatar">🤖</div><div class="chat-header-info"><h4>Gemini AI Assistant</h4></div><div class="chat-close" onclick="closeChat()">✕</div></div>
  <div class="chips-wrap"><button class="chip" onclick="sendChip('Update my profile')">👤 Update Profile</button><button class="chip" onclick="sendChip('Account settings help')">⚙️ Settings</button><button class="chip" onclick="sendChip('Security tips')">🔒 Security</button></div>
  <div class="chat-messages" id="chatMessages"><div class="msg bot"><div class="msg-avatar">🤖</div><div class="msg-bubble">👋 Hi! I'm Gemini. Need help with your profile or account settings?</div></div></div>
  <div class="typing-indicator" id="typingIndicator"><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>
  <div class="chat-input-area"><textarea class="chat-input" id="chatInput" placeholder="Ask Gemini about your account..." rows="1" onkeydown="handleKey(event)"></textarea><button class="chat-send" onclick="sendMessage()">➤</button></div>
</div>
<button class="chat-fab" id="chatFab" onclick="toggleChat()">🤖</button>

<script>
async function loadProfile() {
  const token = localStorage.getItem('token');
  if (!token) { setProfileDefaults(); return; }
  try {
    const res = await fetch('http://localhost:5000/api/profile', { headers: { Authorization: 'Bearer ' + token } });
    const data = await res.json();
    document.getElementById('p_name').innerText = data.fullName || 'NGO Manager';
    document.getElementById('p_role').innerText = data.role || 'Field Officer';
    document.getElementById('p_email').innerText = data.email || '—';
    document.getElementById('pf_email').innerText = data.email || '—';
    document.getElementById('p_phone').innerText = data.phoneNumber || '—';
    document.getElementById('p_location').innerText = data.location || '—';
    document.getElementById('pf_role').innerText = data.role || '—';
  } catch { setProfileDefaults(); }
}
function setProfileDefaults() {
  document.getElementById('p_name').innerText = 'NGO Manager';
  document.getElementById('p_role').innerText = 'Field Officer';
}
function logout() { localStorage.removeItem('token'); window.location.href = 'login.html'; }
loadProfile();

// Chatbot
let chatOpen = false, chatHistory = [];
const CHAT_KEY = 'ngo_chat_history';
function toggleChat() { chatOpen ? closeChat() : openChat(); }
function openChat() {
  chatOpen = true;
  document.getElementById('chatPanel').classList.add('open');
  document.getElementById('chatBackdrop').classList.add('open');
  document.getElementById('chatFab').innerText = '✕';
  restoreHistory();
  setTimeout(() => document.getElementById('chatInput').focus(), 350);
}
function closeChat() {
  chatOpen = false;
  document.getElementById('chatPanel').classList.remove('open');
  document.getElementById('chatBackdrop').classList.remove('open');
  document.getElementById('chatFab').innerText = '🤖';
}
function appendMsg(text, role) {
  const wrap = document.getElementById('chatMessages');
  const div = document.createElement('div'); div.className = 'msg ' + role;
  const av = document.createElement('div'); av.className = 'msg-avatar'; av.innerText = role === 'bot' ? '🤖' : '🧑';
  const bub = document.createElement('div'); bub.className = 'msg-bubble'; bub.innerText = text;
  div.appendChild(av); div.appendChild(bub); wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}
function showTyping() { document.getElementById('typingIndicator').classList.add('show'); }
function hideTyping() { document.getElementById('typingIndicator').classList.remove('show'); }
function saveHistory(messages) { try { localStorage.setItem(CHAT_KEY, JSON.stringify(messages)); } catch {} }
function restoreHistory() {
  try {
    const stored = JSON.parse(localStorage.getItem(CHAT_KEY) || '[]');
    if (stored.length > 0) { document.getElementById('chatMessages').innerHTML = ''; stored.forEach(m => appendMsg(m.text, m.role)); }
  } catch {}
}
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('chips').style.display = 'none';
  appendMsg(text, 'user');
  chatHistory.push({ role: 'user', text: text });
  showTyping();
  try {
    const res = await fetch('http://localhost:5000/api/gemini', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    hideTyping();
    const reply = data?.reply || 'I encountered an issue.';
    appendMsg(reply, 'bot');
    chatHistory.push({ role: 'bot', text: reply });
    saveHistory(chatHistory.map(m => ({ text: m.text, role: m.role })));
  } catch { hideTyping(); appendMsg('⚠️ Could not reach Gemini backend.', 'bot'); }
}
function sendChip(text) { document.getElementById('chatInput').value = text; sendMessage(); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
</script>
</body>
</html>
