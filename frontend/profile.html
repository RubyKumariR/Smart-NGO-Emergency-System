<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart NGO - My Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffe4e9; --surface: #fff5f7; --card: #ffffff; --card-2: #fff0f3;
  --border: rgba(0,0,0,0.08); --border-lg: rgba(204,0,0,0.15);
  --accent: #cc0000; --accent-2: #ff3300; --danger: #dc2626;
  --success: #16a34a; --text: #1e1b4b; --muted: #7c6b8f;
  --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
  --radius: 14px; --radius-lg: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body); background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
}
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 72px;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 8px; z-index: 100;
}
.sidebar-logo {
  width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 12px; box-shadow: 0 0 20px rgba(204,0,0,0.25);
}
.nav-item {
  width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; font-size: 20px; color: var(--muted);
  border: 1px solid transparent; transition: all 0.2s; position: relative;
}
.nav-item:hover, .nav-item.active { background: rgba(204,0,0,0.08); border-color: rgba(204,0,0,0.2); color: var(--accent); }
.nav-item .tooltip {
  position: absolute; left: 60px; background: var(--card-2); border: 1px solid var(--border);
  color: var(--text); font-size: 12px; padding: 6px 10px; border-radius: 8px;
  white-space: nowrap; opacity: 0; pointer-events: none; transform: translateX(-4px);
  transition: all 0.2s;
}
.nav-item:hover .tooltip { opacity: 1; transform: translateX(0); }
.sidebar-spacer { flex: 1; }
.logout-btn {
  width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; font-size: 18px; color: var(--muted);
  transition: all 0.2s;
}
.logout-btn:hover { background: rgba(220,38,38,0.1); color: var(--danger); }
.main { margin-left: 72px; padding: 32px; min-height: 100vh; position: relative; z-index: 1; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
.page-title { font-family: var(--font-head); font-size: 26px; font-weight: 700; color: var(--text); }
.page-title span { color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.status-pill {
  display: flex; align-items: center; gap: 6px; background: rgba(22,163,74,0.1);
  border: 1px solid rgba(22,163,74,0.2); color: var(--success); font-size: 12px;
  padding: 6px 12px; border-radius: 99px;
}
.status-dot { width: 7px; height: 7px; background: var(--success); border-radius: 50%; animation: pulse-dot 2s ease infinite; }
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.avatar {
  width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; color: white;
}
.profile-wrap { max-width: 700px; margin: 0 auto; }
.profile-hero {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 32px; display: flex; align-items: center; gap: 24px; margin-bottom: 20px;
  flex-wrap: wrap;
}
.profile-avatar {
  width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center; font-size: 36px; color: white;
}
.profile-info h2 { font-family: var(--font-head); font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.profile-info p { font-size: 13px; color: var(--muted); margin: 4px 0; }
.profile-fields { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.pf-row {
  display: flex; align-items: center; padding: 18px 24px;
  border-bottom: 1px solid var(--border); gap: 16px;
}
.pf-row:last-child { border-bottom: none; }
.pf-icon { font-size: 20px; width: 32px; text-align: center; }
.pf-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
.pf-value { font-size: 15px; font-weight: 500; color: var(--text); }
.edit-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white; border: none; padding: 12px 24px; border-radius: 40px;
  font-weight: 600; cursor: pointer; margin-top: 20px; width: 100%;
  transition: transform 0.2s;
}
.edit-btn:hover { transform: translateY(-2px); }
.modal {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000;
  align-items: center; justify-content: center;
}
.modal.show { display: flex; }
.modal-content {
  background: var(--card); border-radius: var(--radius-lg); padding: 28px;
  max-width: 500px; width: 90%;
}
.modal-content input, .modal-content textarea {
  width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border);
  border-radius: 12px; background: var(--card-2);
}
.modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
.modal-buttons button { flex: 1; padding: 12px; border-radius: 12px; border: none; cursor: pointer; }
.modal-save { background: var(--accent); color: white; }
.modal-cancel { background: var(--card-2); }
.server-status {
  position: fixed; bottom: 20px; left: 100px; background: rgba(0,0,0,0.7);
  padding: 6px 12px; border-radius: 20px; font-size: 11px; z-index: 1000;
  display: flex; align-items: center; gap: 8px; color: white;
}
.status-led { width: 8px; height: 8px; border-radius: 50%; }
.status-led.online { background: #22c55e; animation: pulse 2s infinite; }
.status-led.offline { background: #ef4444; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.toast {
  position: fixed; bottom: 30px; right: 30px; background: var(--accent);
  color: white; padding: 12px 24px; border-radius: 12px; z-index: 1100;
  transform: translateX(400px); transition: 0.3s;
}
.toast.show { transform: translateX(0); }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">🚨</div>
  <a href="ngo.html" class="nav-item">🏠<span class="tooltip">Dashboard</span></a>
  <a href="create-need.html" class="nav-item">➕<span class="tooltip">Create Need</span></a>
   <a href="ocr-scanner.html" class="nav-item">📷<span class="tooltip">OCR Scanner</span></a>
  <a href="map.html" class="nav-item">🗺️<span class="tooltip">Map</span></a>
  <a href="manage-volunteers.html" class="nav-item">🤝<span class="tooltip">Volunteers</span></a>
  <a href="volunteer-stats.html" class="nav-item">📊<span class="tooltip">Stats</span></a>
  <a href="profile.html" class="nav-item active">👤<span class="tooltip">Profile</span></a>
  <div class="sidebar-spacer"></div>
  <div class="logout-btn" onclick="logout()" title="Logout">🚪</div>
</nav>

<main class="main">
  <div class="topbar">
    <h1 class="page-title">My <span>Profile</span></h1>
    <div class="topbar-right">
      <div class="status-pill" id="statusPill"><div class="status-dot"></div> Checking...</div>
      <div class="avatar">🧑</div>
    </div>
  </div>
  
  <div class="profile-wrap">
    <div class="profile-hero">
      <div class="profile-avatar" id="profileAvatar">🧑</div>
      <div class="profile-info">
        <h2 id="p_name">Loading...</h2>
        <p id="p_role">—</p>
        <p id="p_email">—</p>
      </div>
    </div>
    
    <div class="profile-fields">
      <div class="pf-row"><span class="pf-icon">📧</span><div><div class="pf-label">Email</div><div class="pf-value" id="pf_email">—</div></div></div>
      <div class="pf-row"><span class="pf-icon">📞</span><div><div class="pf-label">Phone</div><div class="pf-value" id="p_phone">—</div></div></div>
      <div class="pf-row"><span class="pf-icon">📍</span><div><div class="pf-label">Location</div><div class="pf-value" id="p_location">—</div></div></div>
      <div class="pf-row"><span class="pf-icon">🎖️</span><div><div class="pf-label">Role</div><div class="pf-value" id="pf_role">—</div></div></div>
    </div>
    
    <button class="edit-btn" onclick="openEditModal()">✏️ Edit Profile</button>
  </div>
</main>

<div class="modal" id="editModal">
  <div class="modal-content">
    <h3>Edit Profile</h3>
    <input type="text" id="edit_name" placeholder="Full Name">
    <input type="tel" id="edit_phone" placeholder="Phone">
    <input type="text" id="edit_location" placeholder="Location">
    <div class="modal-buttons">
      <button class="modal-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="modal-save" onclick="saveProfile()">Save</button>
    </div>
  </div>
</div>

<div class="server-status" id="serverStatus">
  <div class="status-led" id="statusLed"></div>
  <span id="statusText">Checking...</span>
</div>
<div id="toast" class="toast"></div>

<script>
const API_BASE = 'http://localhost:5000/api';

function showToast(msg, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.background = type === 'success' ? '#16a34a' : type === 'error' ? '#dc2626' : '#cc0000';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

async function loadProfile() {
    const token = localStorage.getItem('token');
    
    if (!token) {
        showToast('Please login first', 'error');
        setTimeout(() => window.location.href = 'login.html', 1500);
        return;
    }
    
    try {
        console.log('Fetching profile from:', `${API_BASE}/auth/profile`);
        
        const response = await fetch(`${API_BASE}/auth/profile`, {
            headers: { 
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });
        
        console.log('Response status:', response.status);
        
        if (response.ok) {
            const data = await response.json();
            console.log('Profile data:', data);
            
            document.getElementById('p_name').innerText = data.fullName || 'User';
            document.getElementById('p_role').innerText = data.role === 'ngo' ? 'NGO Coordinator' : 'Volunteer';
            document.getElementById('p_email').innerText = data.email || '—';
            document.getElementById('pf_email').innerText = data.email || '—';
            document.getElementById('p_phone').innerText = data.phoneNumber || '—';
            document.getElementById('p_location').innerText = data.location || '—';
            document.getElementById('pf_role').innerText = data.role === 'ngo' ? 'NGO' : 'Volunteer';
            
            const initial = (data.fullName || 'U').charAt(0);
            document.getElementById('profileAvatar').innerText = initial;
            
            document.getElementById('statusLed').className = 'status-led online';
            document.getElementById('statusText').innerHTML = '✅ Connected';
            document.getElementById('statusPill').innerHTML = '<div class="status-dot"></div> ✅ Online';
            
            showToast('Profile loaded successfully', 'success');
        } else if (response.status === 401) {
            showToast('Session expired. Please login again.', 'error');
            localStorage.clear();
            setTimeout(() => window.location.href = 'login.html', 1500);
        } else {
            const error = await response.json();
            showToast(error.error || 'Failed to load profile', 'error');
        }
    } catch (error) {
        console.error('Load error:', error);
        showToast('Could not connect to server. Make sure backend is running.', 'error');
        document.getElementById('statusLed').className = 'status-led offline';
        document.getElementById('statusText').innerHTML = '⚠️ Offline';
    }
}

function openEditModal() {
    document.getElementById('edit_name').value = document.getElementById('p_name').innerText;
    document.getElementById('edit_phone').value = document.getElementById('p_phone').innerText;
    document.getElementById('edit_location').value = document.getElementById('p_location').innerText;
    document.getElementById('editModal').classList.add('show');
}

function closeEditModal() {
    document.getElementById('editModal').classList.remove('show');
}

async function saveProfile() {
    const token = localStorage.getItem('token');
    if (!token) {
        showToast('Please login', 'error');
        return;
    }
    
    const updated = {
        fullName: document.getElementById('edit_name').value,
        phoneNumber: document.getElementById('edit_phone').value,
        location: document.getElementById('edit_location').value
    };
    
    try {
        const response = await fetch(`${API_BASE}/auth/profile`, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(updated)
        });
        
        if (response.ok) {
            const data = await response.json();
            document.getElementById('p_name').innerText = data.fullName;
            document.getElementById('p_phone').innerText = data.phoneNumber || '—';
            document.getElementById('p_location').innerText = data.location || '—';
            document.getElementById('profileAvatar').innerText = (data.fullName || 'U').charAt(0);
            closeEditModal();
            showToast('Profile updated successfully!', 'success');
        } else {
            throw new Error('Update failed');
        }
    } catch (error) {
        showToast('Update failed', 'error');
    }
}

function logout() {
    localStorage.clear();
    showToast('Logged out', 'success');
    setTimeout(() => window.location.href = 'login.html', 500);
}

// Load profile on page load
loadProfile();
</script>
</body>
</html>
