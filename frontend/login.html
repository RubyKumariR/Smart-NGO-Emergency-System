<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  /* Only background changed to very light pink */
  background: #ffe4e9;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Main container */
.login-container {
  background: white;
  width: 100%;
  max-width: 420px;
  padding: 2rem;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  border-top: 8px solid #cc0000;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  color: #cc0000;
  margin: 0;
  font-size: 26px;
}

.header p {
  color: #555;
  font-size: 14px;
}

/* Form styles */
.form-group {
  margin-bottom: 15px;
}

label {
  font-weight: 600;
  color: #333;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border: 1px solid #ddd;
  border-radius: 6px;
  transition: 0.3s;
}

input:focus {
  border-color: #ff3300;
  outline: none;
  box-shadow: 0 0 5px rgba(255,51,0,0.3);
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(to right, #cc0000, #ff3300);
  color: white;
  font-size: 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: linear-gradient(to right, #990000, #cc0000);
}

/* Message */
.message {
  margin-top: 10px;
  text-align: center;
  font-weight: 500;
}

.error {
  color: red;
}

.success {
  color: green;
}

/* Register link */
.register-link {
  text-align: center;
  margin-top: 15px;
}

.register-link a {
  color: #cc0000;
  font-weight: bold;
  text-decoration: none;
}

.register-link a:hover {
  text-decoration: underline;
}

/* Footer strip */
.footer-strip {
  margin-top: 15px;
  text-align: center;
  font-size: 12px;
  color: #777;
}

</style>
</head>

<body>

<div class="login-container">

  <div class="header">
    <h1>Smart NGO Resource Management</h1>
    <p>Efficient Resource Distribution Platform</p>
  </div>

  <form id="loginForm">

    <div class="form-group">
      <label>Email ID</label>
      <input type="email" id="email" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>
    </div>

    <button type="submit">Login</button>

    <div id="message" class="message"></div>

  </form>

  <div class="register-link">
    New User? <a href="registration.html">Register Here</a>
  </div>

  <div class="footer-strip">
    © 2026 Smart NGO Platform
  </div>

</div>


<script>
const form = document.getElementById("loginForm");
const message = document.getElementById("message");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch("http://localhost:5000/api/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      message.innerText = data.error || "Login failed";
      message.className = "message error";
      return;
    }

    // ✅ FIXED TOKEN STORAGE
    localStorage.setItem("token", data.token);

    message.innerText = "Login successful!";
    message.className = "message success";

    // Redirect based on role
    setTimeout(() => {
  if (data.user.role === "ngo") {
    window.location.href = "ngo.html";
  } 
  else if (data.user.role === "volunteer") {
    window.location.href = "volunteer.html";
  }
}, 1000);

  } catch (err) {
    console.log(err);
    message.innerText = "Server error";
    message.className = "message error";
  }
});
</script>

</body>
</html>
