<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart NGO - Volunteer Performance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffe4e9; --surface: #fff5f7; --card: #ffffff; --card-2: #fff0f3;
  --border: rgba(0,0,0,0.08); --border-lg: rgba(204,0,0,0.15);
  --accent: #cc0000; --accent-2: #ff3300; --danger: #dc2626;
  --success: #16a34a; --text: #1e1b4b; --muted: #7c6b8f;
  --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
  --radius: 14px; --radius-lg: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body); background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.015'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 72px;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 8px; z-index: 100;
}
.sidebar-logo {
  width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 12px; box-shadow: 0 0 20px rgba(204,0,0,0.25);
  cursor: pointer;
}
.nav-item {
  width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; font-size: 20px; color: var(--muted);
  border: 1px solid transparent; transition: all 0.2s; position: relative;
}
.nav-item:hover, .nav-item.active { background: rgba(204,0,0,0.08); border-color: rgba(204,0,0,0.2); color: var(--accent); }
.nav-item .tooltip {
  position: absolute; left: 60px; background: var(--card-2); border: 1px solid var(--border);
  color: var(--text); font-size: 12px; padding: 6px 10px; border-radius: 8px;
  white-space: nowrap; opacity: 0; pointer-events: none; transform: translateX(-4px);
  transition: all 0.2s;
}
.nav-item:hover .tooltip { opacity: 1; transform: translateX(0); }
.sidebar-spacer { flex: 1; }
.logout-btn {
  width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; font-size: 18px; color: var(--muted);
  transition: all 0.2s;
}
.logout-btn:hover { background: rgba(220,38,38,0.1); color: var(--danger); }
.main { margin-left: 72px; padding: 32px; min-height: 100vh; position: relative; z-index: 1; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
.page-title { font-family: var(--font-head); font-size: 26px; font-weight: 700; color: var(--text); }
.page-title span { color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.status-pill {
  display: flex; align-items: center; gap: 6px; background: rgba(22,163,74,0.1);
  border: 1px solid rgba(22,163,74,0.2); color: var(--success); font-size: 12px;
  padding: 6px 12px; border-radius: 99px;
}
.status-dot { width: 7px; height: 7px; background: var(--success); border-radius: 50%; animation: pulse-dot 2s ease infinite; }
.avatar {
  width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; color: white;
}

/* Stats Panel Styles */
.stats-panel {
    background: var(--card);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-top: 24px;
    border: 1px solid var(--border);
}
.stats-panel h3 {
    font-family: var(--font-head);
    font-size: 18px;
    margin-bottom: 16px;
    color: var(--accent);
}
.volunteer-stats-grid {
    overflow-x: auto;
}
.volunteer-stats-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}
.volunteer-stats-table th,
.volunteer-stats-table td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
}
.volunteer-stats-table th {
    background: var(--card-2);
    font-weight: 600;
    color: var(--text);
}
.volunteer-stats-table tr:hover {
    background: rgba(204,0,0,0.05);
}
.status-badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
}
.status-active { background: #dcfce7; color: #16a34a; }
.status-busy { background: #fef3c7; color: #d97706; }
.status-inactive { background: #fee2e2; color: #dc2626; }
.stats-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
}
.summary-card {
    background: var(--card-2);
    padding: 16px;
    border-radius: var(--radius);
    text-align: center;
}
.summary-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
}
.summary-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
}
.progress-bar {
    width: 80px;
    height: 6px;
    background: #e2e8f0;
    border-radius: 3px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: #10b981;
    border-radius: 3px;
}
.skill-tag {
    background: var(--card-2);
    padding: 2px 6px;
    border-radius: 12px;
    font-size: 10px;
    display: inline-block;
    margin: 2px;
}
.loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
}
.toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--accent);
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    z-index: 1100;
    transform: translateX(400px);
    transition: 0.3s;
    font-size: 13px;
}
.toast.show { transform: translateX(0); }
.server-status {
    position: fixed;
    bottom: 20px;
    left: 100px;
    background: rgba(0,0,0,0.7);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 8px;
    color: white;
}
.status-led { width: 8px; height: 8px; border-radius: 50%; }
.status-led.online { background: #22c55e; animation: pulse 2s infinite; }
.status-led.offline { background: #ef4444; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@media (max-width: 768px) {
    .sidebar { width: 60px; }
    .main { margin-left: 60px; padding: 16px; }
    .stats-summary { grid-template-columns: repeat(2, 1fr); }
    .volunteer-stats-table { font-size: 11px; }
    .volunteer-stats-table th, .volunteer-stats-table td { padding: 6px; }
}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo" onclick="navigateTo('home.html')">🚨</div>
  <a href="ngo.html" class="nav-item">🏠<span class="tooltip">Dashboard</span></a>
  <a href="create-need.html" class="nav-item">➕<span class="tooltip">Create Need</span></a>
  <a href="map.html" class="nav-item">🗺️<span class="tooltip">Map</span></a>
  <a href="manage-volunteers.html" class="nav-item">🤝<span class="tooltip">Volunteers</span></a>
  <a href="volunteer-stats.html" class="nav-item active">📊<span class="tooltip">Stats</span></a>
  <a href="profile.html" class="nav-item">👤<span class="tooltip">Profile</span></a>
  <div class="sidebar-spacer"></div>
  <div class="logout-btn" onclick="logout()" title="Logout">🚪</div>
</nav>

<main class="main">
  <div class="topbar">
    <h1 class="page-title">Volunteer <span>Performance Dashboard</span></h1>
    <div class="topbar-right">
      <div class="status-pill" id="statusPill"><div class="status-dot"></div> Checking...</div>
      <div class="avatar" id="userAvatar">🧑</div>
    </div>
  </div>

  <div id="statsContainer">
    <div class="loading">📡 Loading volunteer statistics...</div>
  </div>
</main>

<div class="server-status" id="serverStatus">
  <div class="status-led" id="statusLed"></div>
  <span id="statusText">Checking server...</span>
</div>
<div id="toast" class="toast"></div>

<script>
const API_BASE = 'http://localhost:5000/api';
let token = localStorage.getItem('token');

if (!token) {
    showToast('Please login first', 'error');
    setTimeout(() => window.location.href = 'login.html', 1500);
}

function navigateTo(page) { window.location.href = page; }

function showToast(message, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.background = type === 'success' ? '#16a34a' : type === 'error' ? '#dc2626' : '#cc0000';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

async function checkServerHealth() {
    const statusLed = document.getElementById('statusLed');
    const statusText = document.getElementById('statusText');
    const statusPill = document.getElementById('statusPill');
    try {
        const response = await fetch(`${API_BASE}/health`);
        if (response.ok) {
            statusLed.className = 'status-led online';
            statusText.innerHTML = '✅ Connected';
            statusPill.innerHTML = '<div class="status-dot"></div> ✅ Online';
            return true;
        }
    } catch (error) {
        statusLed.className = 'status-led offline';
        statusText.innerHTML = '⚠️ Offline';
        statusPill.innerHTML = '<div style="background:#ff4444; width:7px; height:7px; border-radius:50%;"></div> Offline';
        return false;
    }
    return false;
}

async function loadVolunteerStats() {
    const container = document.getElementById('statsContainer');
    container.innerHTML = '<div class="loading">📡 Loading volunteer performance data...</div>';
    
    try {
        const response = await fetch(`${API_BASE}/task-assignment/volunteer-stats`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.status === 401) {
            localStorage.clear();
            showToast('Session expired. Please login again.', 'error');
            setTimeout(() => window.location.href = 'login.html', 1500);
            return;
        }
        
        if (!response.ok) throw new Error('Failed to fetch stats');
        
        const data = await response.json();
        console.log('Stats data:', data);
        
        renderStats(data);
        showToast('✅ Volunteer stats loaded!', 'success');
        
    } catch (error) {
        console.error('Error:', error);
        container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Failed to load volunteer stats. Make sure backend is running.</p></div>`;
        showToast('Failed to load stats', 'error');
    }
}

function renderStats(data) {
    const overall = data.overallStats;
    const volunteers = data.volunteers;
    
    const html = `
        <div class="stats-panel">
            <h3>📊 Overall Statistics</h3>
            <div class="stats-summary">
                <div class="summary-card"><div class="summary-value">${overall.totalVolunteers}</div><div class="summary-label">Total Volunteers</div></div>
                <div class="summary-card"><div class="summary-value">${overall.activeVolunteers}</div><div class="summary-label">Active</div></div>
                <div class="summary-card"><div class="summary-value">${overall.busyVolunteers}</div><div class="summary-label">Busy</div></div>
                <div class="summary-card"><div class="summary-value">${overall.totalTasksAssigned}</div><div class="summary-label">Tasks Assigned</div></div>
                <div class="summary-card"><div class="summary-value">${overall.totalTasksAccepted}</div><div class="summary-label">Accepted</div></div>
                <div class="summary-card"><div class="summary-value">${overall.totalTasksCompleted}</div><div class="summary-label">Completed</div></div>
                <div class="summary-card"><div class="summary-value">${overall.averageCompletionRate}%</div><div class="summary-label">Avg Completion Rate</div></div>
            </div>
        </div>
        
        <div class="stats-panel">
            <h3>📋 Volunteer Performance Details</h3>
            <div class="volunteer-stats-grid">
                <table class="volunteer-stats-table">
                    <thead>
                        <tr>
                            <th>Volunteer</th>
                            <th>Location</th>
                            <th>Skills</th>
                            <th>📋 Assigned</th>
                            <th>✅ Accepted</th>
                            <th>📍 Reached</th>
                            <th>🎉 Completed</th>
                            <th>❌ Rejected</th>
                            <th>Rate</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${volunteers.map(vol => `
                            <tr>
                                <td>
                                    <strong>${escapeHtml(vol.name)}</strong><br>
                                    <small>📧 ${escapeHtml(vol.email)}</small><br>
                                    <small>📞 ${vol.phone || 'N/A'}</small>
                                </td>
                                <td>${escapeHtml(vol.location || 'Not set')}</td>
                                <td>
                                    ${vol.skills.slice(0, 3).map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}
                                    ${vol.skills.length > 3 ? `<span class="skill-tag">+${vol.skills.length-3}</span>` : ''}
                                </td>
                                <td>${vol.stats.assigned}</td>
                                <td>${vol.stats.accepted}</td>
                                <td>${vol.stats.reached}</td>
                                <td><strong>${vol.stats.completed}</strong></td>
                                <td>${vol.stats.rejected}</td>
                                <td>
                                    ${vol.stats.completionRate}%
                                    <div class="progress-bar"><div class="progress-fill" style="width: ${vol.stats.completionRate}%"></div></div>
                                </td>
                                <td>
                                    <span class="status-badge status-${vol.status === 'active' ? 'active' : vol.status === 'busy' ? 'busy' : 'inactive'}">
                                        ${vol.status === 'active' ? '🟢 Active' : vol.status === 'busy' ? '🟡 Busy' : '⚫ Inactive'}
                                    </span>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    `;
    
    document.getElementById('statsContainer').innerHTML = html;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function logout() {
    localStorage.clear();
    showToast('Logged out', 'success');
    setTimeout(() => window.location.href = 'login.html', 500);
}

async function init() {
    await checkServerHealth();
    await loadVolunteerStats();
    
    const userEmail = localStorage.getItem('userEmail') || 'NGO';
    document.getElementById('userAvatar').innerText = userEmail.charAt(0).toUpperCase();
    
    // Auto-refresh every 30 seconds
    setInterval(async () => {
        if (document.getElementById('statusLed').classList.contains('online')) {
            await loadVolunteerStats();
        }
    }, 30000);
}

init();
</script>
</body>
</html>
